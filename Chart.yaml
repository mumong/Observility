apiVersion: v2
name: observability
description: Unified observability chart
type: application
version: 1.0.2
appVersion: "1.0.0"

dependencies:
  - name: grafana
    alias: grafana
    version: 9.2.7
    repository: "file://charts/grafana"
    condition: metric.enabled
  - name: kube-state-metrics
    version: 5.37.0
    repository: "file://charts/kube-state-metrics"
    condition: metric.enabled
  - name: prometheus-node-exporter
    version: 4.47.0
    repository: "file://charts/prometheus-node-exporter"
    condition: metric.enabled
  - name: crds
    version: 0.0.0
    repository: "file://charts/crds"
  - name: clickhouse
    version: '*.*.*'
    repository: "file://charts/clickhouse"
    condition: tracing.enabled,tracing.clickhouse.enabled
  - name: mysql
    version: '*.*.*'
    repository: "file://charts/mysql"
    condition: tracing.enabled,tracing.mysql.enabled
  - name: deepflow-agent
    version: '*.*.*'
    repository: "file://charts/deepflow-agent"
    condition: tracing.enabled,tracing.deepflow-agent.enabled
    import-values:
      - child: global
        parent: tracing.global
  - name: stella-agent-ce
    version: '*.*.*'
    repository: "file://charts/stella-agent-ce"
    condition: tracing.stella-agent-ce.enabled
  - name: byconity
    version: '*.*.*'
    repository: "file://charts/byconity"
    condition: tracing.byconity.enabled
