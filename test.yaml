# Source: observability/charts/mysql/templates/configmap.yaml
kind: ConfigMap
apiVersion: v1
metadata:
  name: obs-mysql
  labels:
    helm.sh/chart: mysql-0.1.000
    app: deepflow
    component: mysql
    app.kubernetes.io/name: mysql
    app.kubernetes.io/instance: obs
    app.kubernetes.io/version: "8.0.39"
    app.kubernetes.io/managed-by: Helm
data:
  my.cnf: |-
    [client]
    default-character-set=utf8

    [mysqld]
    default-authentication-plugin=mysql_native_password

    # Network related
    bind-address=*
    port=30130

    # Enable query cache
    innodb_buffer_pool_size=20M
    max_connections=1000
    wait_timeout=60

    # Replication related
    slave_skip_errors=all

    ## Binlog expiration time, default 1 days
    binlog_expire_logs_seconds = 86400
  init.sql: |-
    ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'deepflow';
    CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'deepflow';
    GRANT ALL ON *.* TO 'root'@'%' WITH GRANT OPTION;
    CREATE USER IF NOT EXISTS 'grafana'@'%' IDENTIFIED WITH mysql_native_password BY 'deepflow';
    GRANT ALL ON *.* TO 'grafana'@'%' WITH GRANT OPTION;
---
# Source: observability/templates/customer/dataservice/telegraf-configmap.yaml
# Custom Telegraf configuration with dynamic service discovery
# This ConfigMap overrides the default Telegraf configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: obs-observability-telegraf-config
  namespace: ob
  labels:
    helm.sh/chart: observability-1.0.0
    app.kubernetes.io/name: observability
    app.kubernetes.io/instance: obs
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
  app.kubernetes.io/component: telegraf
data:
  telegraf.conf: |+
    [agent]
      collection_jitter = "0s"
      debug = false
      flush_interval = "5s"
      flush_jitter = "0s"
      interval = "10s"
      logfile = ""
      metric_batch_size = 10000
      metric_buffer_limit = 100000
      omit_hostname = false
      precision = ""
      quiet = false
      round_interval = true

    [global_tags]
      cluster = "my-cluster"

    [[outputs.influxdb_v2]]
      urls = ["http://xnet-management.xnet.svc.cluster.local:8000"]
      token = "xAKhwOajomWrmraW7OWHo63GyGWNftJD"
      bucket = "xnet"
      organization = "influxdata"

    [[inputs.statsd]]
      allowed_pending_messages = 10000
      metric_separator = "_"
      percentile_limit = 1000
      percentiles = [50.0, 95.0, 99.0]
      service_address = ":8125"

    [[inputs.internal]]
      collect_memstats = false

     [[inputs.prometheus]]
       urls = ["http://obs-observability-prometheus.ob.svc.cluster.local:9090/federate?match[]={__name__!=\"\"}"]
       metric_version = 2
       interval = "60s"
       timeout = "100s"

    [[processors.enum]]
      [[processors.enum.mapping]]
        field = "status"
        dest = "status_code"
        [processors.enum.mapping.value_mappings]
          healthy = 1
          problem = 2
          critical = 3
