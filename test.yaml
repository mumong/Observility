spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: obs
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        helm.sh/chart: grafana-9.2.7
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: obs
        app.kubernetes.io/version: "12.0.2"
      annotations:
        checksum/config: e586203433e5c72c0b30be6bdc1cee72464568ae3c1d377f84635d0dfa255afc
        checksum/dashboards-json-config: bc879f0aa1f1598db2b959f909cb8453e6bf579851166adc8373119fd3971569
        checksum/sc-dashboard-provider-config: 1572db94a37b1c957b50a3fecdd53d8854eda8b90bcf089b48836a9e51d70496
        checksum/secret: 9014ce2196439b89fe418661428f1bc68bdef9d82c4d4a793eb538ea5fa936c5
        kubectl.kubernetes.io/default-container: grafana
    spec:
      
      serviceAccountName: obs-grafana
      automountServiceAccountToken: true
      shareProcessNamespace: false
      securityContext:
        fsGroup: 472
        runAsGroup: 472
        runAsNonRoot: true
        runAsUser: 472
      initContainers:
        - name: download-dashboards
          image: "docker.io/curlimages/curl:8.9.1"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh"]
          args: [ "-c", "mkdir -p /var/lib/grafana/dashboards/default && /bin/sh -x /etc/grafana/download_dashboards.sh" ]
          env:
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: "/etc/grafana/download_dashboards.sh"
              subPath: download_dashboards.sh
            - name: storage
              mountPath: "/var/lib/grafana"
        - image: 'registry.cn-hongkong.aliyuncs.com/deepflow-ce/deepflowio-init-grafana:v7.0'
          imagePullPolicy: 'IfNotPresent'
          name: init-custom-plugins
          volumeMounts:
          - mountPath: /var/lib/grafana/plugins
            name: custom-plugins
        - image: 'registry.cn-hongkong.aliyuncs.com/deepflow-ce/deepflowio-init-grafana-ds-dh:latest'
          imagePullPolicy: 'IfNotPresent'
          name: init-grafana-ds-dh
          volumeMounts:
          - mountPath: /tmp/dashboards
            name: sc-dashboard-volume
          - mountPath: /etc/grafana/provisioning/dashboards
            name: grafana-dashboards-config
          - mountPath: /etc/grafana/provisioning/datasources
            name: sc-datasources-volume
        - args:
          - |
            # 确保 deepflow-datasource.yaml 文件存在
            FILE_PATH="/etc/grafana/provisioning/datasources/deepflow-datasource.yaml"
            echo "Starting init container to fix Grafana datasource configuration..."
        
            # 等待文件存在，增加健壮性
            for i in $(seq 1 10); do
              if [ -f "$FILE_PATH" ]; then
                echo "$FILE_PATH found. Proceeding with modifications."
                break
              fi
              echo "Waiting for $FILE_PATH to be created... (Attempt $i/10)"
              sleep 2
              if [ "$i" -eq 10 ]; then
                echo "Error: $FILE_PATH not found after multiple attempts. Exiting."
                exit 1
              fi
            done
        
            # --- 修改 isDefault: true 为 isDefault: false ---
            if grep -q "isDefault: true" "$FILE_PATH"; then
              sed -i 's/isDefault: true/isDefault: false/' "$FILE_PATH"
              echo "Successfully modified 'isDefault: true' to 'isDefault: false' in $FILE_PATH"
            else
              echo "'isDefault: true' not found or already modified in $FILE_PATH. Skipping this modification."
            fi
        
            # --- 修改 DeepFlow ClickHouse 的 UID ---
            # 查找包含 "uid: DeepFlow ClickHouse" 的行，并将其修改为 "uid: DeepFlow-ClickHouse"
            if grep -q "uid: DeepFlow ClickHouse" "$FILE_PATH"; then
              sed -i 's/uid: DeepFlow ClickHouse/uid: DeepFlow-ClickHouse/' "$FILE_PATH"
              echo "Successfully modified 'uid: DeepFlow ClickHouse' to 'uid: DeepFlow-ClickHouse' in $FILE_PATH"
            else
              echo "'uid: DeepFlow ClickHouse' not found or already modified in $FILE_PATH. Skipping this UID modification."
            fi
        
            # --- 新增：修改 DeepFlow MySQL 的 UID ---
            # 查找包含 "uid: DeepFlow MySQL" 的行，并将其修改为 "uid: DeepFlow-MySQL"
            if grep -q "uid: DeepFlow MySQL" "$FILE_PATH"; then
              sed -i 's/uid: DeepFlow MySQL/uid: DeepFlow-MySQL/' "$FILE_PATH"
              echo "Successfully modified 'uid: DeepFlow MySQL' to 'uid: DeepFlow-MySQL' in $FILE_PATH"
            else
              echo "'uid: DeepFlow MySQL' not found or already modified in $FILE_PATH. Skipping this UID modification."
            fi
        
            echo "Init container finished datasource configuration fixes."
          command:
          - /bin/sh
          - -c
          image: alpine/git:latest
          imagePullPolicy: IfNotPresent
          name: fix-deepflow-datasource
          volumeMounts:
          - mountPath: /etc/grafana/provisioning/datasources
            name: sc-datasources-volume
      enableServiceLinks: true
      containers:
        - name: grafana-sc-dashboard
          image: "quay.io/kiwigrid/k8s-sidecar:1.30.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: METHOD
              value: WATCH
            - name: LABEL
              value: "grafana_dashboard"
            - name: LABEL_VALUE
              value: "1"
            - name: FOLDER
              value: "/tmp/dashboards"
            - name: RESOURCE
              value: "both"
            - name: NAMESPACE
              value: "ALL"
            - name: REQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: obs-grafana
                  key: admin-user
            - name: REQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obs-grafana
                  key: admin-password
            - name: REQ_URL
              value: http://localhost:3000/api/admin/provisioning/dashboards/reload
            - name: REQ_METHOD
              value: POST
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: sc-dashboard-volume
              mountPath: "/tmp/dashboards"
        - name: grafana-sc-datasources
          image: "quay.io/kiwigrid/k8s-sidecar:1.30.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: METHOD
              value: WATCH
            - name: LABEL
