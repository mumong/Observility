{{/* Kubernetes Job to initialize/create InfluxDB Tasks and Buckets */}}
{{- if or (and .Values.customer.dataservice.influxdb2.enabled .Values.customer.dataservice.influxdb2.tasks.enabled) (and .Values.customer.dataservice.influxdb2.enabled .Values.customer.dataservice.influxdb2.buckets) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monitoring-stack.fullname" . }}-task-initializer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: task-initializer
  annotations:
    # 强制 Job 在 ConfigMap 变化时重新运行
    checksum/config: {{ include (print $.Template.BasePath "/customer/dataservice/influxdb-configmap-task.yaml") . | sha256sum }}
    checksum/buckets: {{ .Values.customer.dataservice.influxdb2.buckets | toYaml | sha256sum }}
spec:
  # 确保 Job 运行一次成功后即退出
  template:
    metadata:
      labels:
        {{- include "monitoring-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: task-initializer
    spec:
      restartPolicy: OnFailure
      # ⚠️ 确保 ServiceAccountName 已经被定义
      serviceAccountName: {{ include "monitoring-stack.serviceAccountName" . }}
      containers:
        - name: influxdb-cli
          # 使用与 InfluxDB 镜像版本一致的 CLI 工具
          image: influxdb:2.7.4-alpine 
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              INFLUXDB_HOST_URL="{{ include "monitoring-stack.influxdbURL" . }}"
              RETRY_COUNT=0
              MAX_RETRIES=60 # 最大重试 60 次 (每 5 秒一次，总计 5 分钟)
              
              echo "Waiting for InfluxDB to be ready at $INFLUXDB_HOST_URL..."
              
              # 1. 健壮的等待循环：每 5 秒检查 /health 端点
              while ! wget -q --spider --timeout=3 "$INFLUXDB_HOST_URL/health" 2>/dev/null; do
                if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
                  echo "Error: InfluxDB service is not ready after $((MAX_RETRIES * 5)) seconds. Exiting Job."
                  exit 1 # 超过重试次数，Job 以失败退出
                fi
                echo "InfluxDB not ready (Connection refused). Retrying in 5 seconds... (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
                sleep 5
                RETRY_COUNT=$((RETRY_COUNT + 1))
              done
              
              echo "InfluxDB is ready. Starting initialization process."

              # 2. Create buckets if configured
              {{- if .Values.customer.dataservice.influxdb2.bucketbuild.enabled }}
              if [ -f "/etc/influxdb/scripts/create-buckets.sh" ]; then
                echo "Creating buckets..."
                /etc/influxdb/scripts/create-buckets.sh
                echo "Bucket creation process completed."
              fi
              {{- end }}

              # 3. Create tasks if configured
              {{- if .Values.customer.dataservice.influxdb2.tasks.enabled }}
              if [ -d "/etc/influxdb/tasks" ]; then
                echo "Creating tasks..."
                TASK_DIR="/etc/influxdb/tasks"
                for FILE in $TASK_DIR/*.flux; do
                  echo "Processing Task file: $FILE"

                  # 创建/更新 Task
                  influx task create --file $FILE \
                    --org "{{ .Values.customer.dataservice.influxdb2.adminUser.organization }}" \
                    --token "{{ .Values.customer.dataservice.influxdb2.adminUser.token }}" \
                    --host "{{ include "monitoring-stack.influxdbURL" . }}"

                  if [ $? -ne 0 ]; then
                    echo "Warning: Task creation for $FILE encountered an error but continuing..."
                  fi
                done
                echo "Task initialization complete. New Measurement: aggregated_metrics"
              fi
              {{- end }}

              echo "InfluxDB initialization process completed successfully."
          env:
            - name: INFLUXDB_HOST
              value: {{ include "monitoring-stack.influxdbURL" . | quote }}
            - name: INFLUXDB_ORG
              value: {{ .Values.customer.dataservice.influxdb2.adminUser.organization | quote }}
            - name: INFLUXDB_TOKEN
              value: {{ .Values.customer.dataservice.influxdb2.adminUser.token | quote }}
          volumeMounts:
            - name: task-config
              mountPath: /etc/influxdb/tasks
            {{- if .Values.customer.dataservice.influxdb2.bucketbuild.enabled }}
            - name: bucket-scripts
              mountPath: /etc/influxdb/scripts
              readOnly: true
            {{- end }}
      volumes:
        - name: task-config
          configMap:
            name: {{ include "monitoring-stack.fullname" . }}-influxdb-tasks
        {{- if .Values.customer.dataservice.influxdb2.bucketbuild.enabled }}
        - name: bucket-scripts
          configMap:
            name: {{ include "monitoring-stack.fullname" . }}-influxdb-buckets
            defaultMode: 0755
        {{- end }}
{{- end }}