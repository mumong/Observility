{{/* Kubernetes Job to create InfluxDB buckets */}}
{{- if and .Values.customer.dataservice.influxdb2.enabled .Values.customer.dataservice.influxdb2.buckets }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monitoring-stack.fullname" . }}-bucket-creator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: bucket-creator
  annotations:
    # Force Job to rerun when bucket configuration changes
    checksum/buckets: {{ .Values.customer.dataservice.influxdb2.buckets | toYaml | sha256sum }}
spec:
  template:
    metadata:
      labels:
        {{- include "monitoring-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bucket-creator
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "monitoring-stack.serviceAccountName" . }}
      containers:
        - name: influxdb-bucket-creator
          image: influxdb:2.7.4-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/etc/influxdb/scripts/create-buckets.sh"]
          env:
            - name: INFLUXDB_HOST_URL
              value: {{ include "monitoring-stack.influxdbURL" . | quote }}
            - name: INFLUXDB_ORG
              value: {{ .Values.customer.dataservice.influxdb2.adminUser.organization | quote }}
            - name: INFLUXDB_TOKEN
              value: {{ .Values.customer.dataservice.influxdb2.adminUser.token | quote }}
          volumeMounts:
            - name: bucket-scripts
              mountPath: /etc/influxdb/scripts
              readOnly: true
      volumes:
        - name: bucket-scripts
          configMap:
            name: {{ include "monitoring-stack.fullname" . }}-influxdb-buckets
            defaultMode: 0755
{{- end }}