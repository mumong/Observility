# Service account for monitoring components
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "monitoring-stack.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}

---

# RBAC roles for monitoring components
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "monitoring-stack.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "monitoring-stack.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "monitoring-stack.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "monitoring-stack.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

---

