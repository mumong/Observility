# Custom Telegraf configuration with dynamic service discovery
# This ConfigMap overrides the default Telegraf configuration
{{- if .Values.customer.dataservice.telegraf.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-stack.fullname" . }}-telegraf-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: telegraf
data:
  telegraf.conf: |+
    [agent]
      collection_jitter = "0s"
      debug = false
      flush_interval = "30s"
      flush_jitter = "0s"
      interval = "30s"
      logfile = ""
      metric_batch_size = 280000
      metric_buffer_limit = 400000
      omit_hostname = false
      precision = "1ms"
      quiet = false
      round_interval = true

    # [global_tags]
    #   cluster = "{{ .Values.customer.dataservice.telegraf.config.global_tags.cluster}}"


    [[outputs.influxdb_v2]]
      urls = ["{{ .Values.customer.dataservice.telegraf.config.global_tags.output}}"]
      token = "{{ .Values.customer.dataservice.influxdb2.adminUser.token }}"
      bucket = "{{ .Values.customer.dataservice.influxdb2.adminUser.bucket }}"
      organization = "{{ .Values.customer.dataservice.influxdb2.adminUser.organization }}"
      timeout = "600s"
      content_encoding = "gzip"
      #namepass = ["{{ .Values.customer.dataservice.telegraf.config.global_tags.cluster}}"]


    [[inputs.statsd]]
      allowed_pending_messages = 10000
      metric_separator = "_"
      percentile_limit = 1000
      percentiles = [50.0, 95.0, 99.0]
      service_address = ":8125"


    [[inputs.internal]]
      collect_memstats = true

     [[inputs.prometheus]]
       urls = [{{ include "monitoring-stack.prometheusURLs" . }}]
       metric_version = 2
       interval = "30s"
       timeout = "600s"
       name_override = "{{ .Values.customer.dataservice.telegraf.config.global_tags.cluster}}"
      #  taginclude = ["device","mode", "fstype", "instance","cpu","container_id","cluster","cluster_id"]
      taginclude = ["device","mode", "fstype", "instance","cpu","cluster"]
      [inputs.prometheus.tags]
        cluster = "{{ .Values.customer.dataservice.telegraf.config.global_tags.cluster}}"
      [inputs.prometheus.tagdrop]
        device = ["cali*", "veth*", "docker*", "br-*", "lo", "tunl*", "none", "shm", "sr0", "tmpfs"]

    # ########################################################
    # # 额外的 Prometheus 数据源：cluster1-10
    # # 所有数据都会输出到同一个 bucket（因为 namepass 被注释了）
    # ########################################################
    # {{- range $i := until 10 }}
    #  [[inputs.prometheus]]
    #    urls = [{{ include "monitoring-stack.prometheusURLs" $ }}]
    #    metric_version = 2
    #    interval = "30s"
    #    timeout = "600s"
    #    name_override = "cluster{{ add $i 1 }}"
    #   taginclude = ["device","mode", "fstype", "instance","cpu","cluster","cluster_id"]
    #   [inputs.prometheus.tags]
    #     cluster = "cluster{{ add $i 1 }}"
    #   [inputs.prometheus.tagdrop]
    #     device = ["cali*", "veth*", "docker*", "br-*", "lo", "tunl*", "none", "shm", "sr0", "tmpfs"]
    # {{- end }}
{{- end }}