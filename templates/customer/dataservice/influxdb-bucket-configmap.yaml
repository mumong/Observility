{{/* ConfigMap for bucket creation scripts */}}
{{- if and .Values.customer.dataservice.influxdb2.enabled .Values.customer.dataservice.influxdb2.bucketbuild.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-stack.fullname" . }}-influxdb-buckets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: influxdb-buckets
data:
  create-buckets.sh: |
    #!/bin/sh
    set -e

    INFLUXDB_HOST_URL="{{ include "monitoring-stack.influxdbURL" . }}"
    BUCKET_BUILD_ENABLED="{{ .Values.customer.dataservice.influxdb2.bucketbuild.enabled }}"

    echo "Waiting for InfluxDB to be ready at $INFLUXDB_HOST_URL..."
    RETRY_COUNT=0
    MAX_RETRIES=60

    # Wait for InfluxDB to be ready
    while ! wget -q --spider --timeout=3 "$INFLUXDB_HOST_URL/health" 2>/dev/null; do
      if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
        echo "Error: InfluxDB service is not ready after $((MAX_RETRIES * 5)) seconds. Exiting."
        exit 1
      fi
      echo "InfluxDB not ready. Retrying in 5 seconds... (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
      sleep 5
      RETRY_COUNT=$((RETRY_COUNT + 1))
    done

    echo "InfluxDB is ready."

    # Check if bucket build is enabled
    if [ "$BUCKET_BUILD_ENABLED" != "true" ]; then
      echo "Bucket build is disabled. Skipping bucket creation."
      exit 0
    fi

    echo "Bucket build is enabled. Starting bucket creation process..."
    {{- if .Values.customer.dataservice.influxdb2.bucketbuild.buckets }}
    FAILED_COUNT=0
    SUCCESS_COUNT=0
    SKIPPED_COUNT=0
    {{- range .Values.customer.dataservice.influxdb2.bucketbuild.buckets }}
    # Processing bucket: {{ .name }}
    BUCKET_NAME="{{ .name }}"
    BUCKET_ORG="{{ .organization }}"
    BUCKET_TOKEN="{{ .token }}"
    BUCKET_RETENTION="{{ .retention }}"
    BUCKET_SHARD_DURATION="{{ .shardGroupDuration }}"

    echo ""
    echo "Processing bucket: $BUCKET_NAME (org: $BUCKET_ORG, retention: $BUCKET_RETENTION, shard: $BUCKET_SHARD_DURATION)"

    # Check if bucket already exists
    BUCKET_EXISTS=0
    BUCKET_LIST_OUTPUT=$(influx bucket list \
      --org "$BUCKET_ORG" \
      --token "$BUCKET_TOKEN" \
      --host "$INFLUXDB_HOST_URL" \
      --name "$BUCKET_NAME" \
      --hide-headers 2>/dev/null || echo "")
    if echo "$BUCKET_LIST_OUTPUT" | grep -q "$BUCKET_NAME"; then
      BUCKET_EXISTS=1
    fi

    if [ "$BUCKET_EXISTS" -eq 0 ]; then
      echo "  → Bucket $BUCKET_NAME does not exist, creating..."
      if influx bucket create \
        --name "$BUCKET_NAME" \
        --org "$BUCKET_ORG" \
        --token "$BUCKET_TOKEN" \
        --host "$INFLUXDB_HOST_URL" \
        --retention "$BUCKET_RETENTION" \
        --shard-group-duration "$BUCKET_SHARD_DURATION" 2>/dev/null; then
        echo "  ✓ Successfully created bucket: $BUCKET_NAME"
        SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
      else
        echo "  ✗ Failed to create bucket: $BUCKET_NAME"
        FAILED_COUNT=$((FAILED_COUNT + 1))
      fi
    else
      echo "  → Bucket $BUCKET_NAME already exists, skipping creation."
      SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
    fi
    {{- end }}

    echo ""
    echo "=========================================="
    echo "Bucket creation summary:"
    echo "  Successfully created: $SUCCESS_COUNT"
    echo "  Already existed: $SKIPPED_COUNT"
    echo "  Failed: $FAILED_COUNT"
    echo "=========================================="
    {{- else }}
    echo "No buckets configured in bucketbuild.buckets list."
    {{- end }}

    echo ""
    echo "Listing all buckets for verification:"
    {{- if .Values.customer.dataservice.influxdb2.bucketbuild.buckets }}
    {{- range $bucket := .Values.customer.dataservice.influxdb2.bucketbuild.buckets }}
    echo "--- Buckets in organization: {{ $bucket.organization }} ---"
    influx bucket list \
      --org "{{ $bucket.organization }}" \
      --token "{{ $bucket.token }}" \
      --host "$INFLUXDB_HOST_URL" 2>/dev/null || echo "  Failed to list buckets for org: {{ $bucket.organization }}"
    echo ""
    {{- end }}
    {{- end }}
{{- end }}