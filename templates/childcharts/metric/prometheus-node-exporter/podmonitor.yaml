{{- $values := include "childcharts.metric.prometheus-node-exporter.values" . | fromYaml -}}
{{- $metricValues := get .Values "metric" | default dict -}}
{{- $extraValues := get $metricValues "extra" | default dict -}}
{{- $parentGlobal := get $extraValues "global" | default dict -}}
{{- $componentEnabled := or (not (hasKey $values "enabled")) (get $values "enabled") -}}
{{- $global := mustMergeOverwrite (deepCopy ((get $values "global") | default dict)) $parentGlobal -}}
{{- $ctxValues := mustMergeOverwrite (deepCopy $values) (dict "global" $global) -}}
{{- $ctxChart := dict "Name" "prometheus-node-exporter" "Version" "4.47.0" "AppVersion" "1.9.1" -}}
{{- $ctx := dict "Values" $ctxValues "Release" .Release "Chart" $ctxChart "Capabilities" .Capabilities "Files" .Files "Template" .Template -}}
{{- if and (get $metricValues "enabled") $componentEnabled -}}
{{- with $ctx -}}
{{- $ctxRoot := . -}}
{{- if .Values.prometheus.podMonitor.enabled }}
apiVersion: {{ .Values.prometheus.podMonitor.apiVersion | default "monitoring.coreos.com/v1" }}
kind: PodMonitor
metadata:
  name: {{ include "childcharts.metric.prometheus-node-exporter.fullname" . }}
  namespace: {{ include "childcharts.metric.prometheus-node-exporter.podmonitor-namespace" . }}
  labels:
    {{- include "childcharts.metric.prometheus-node-exporter.labels" . | nindent 4 }}
    {{- with .Values.prometheus.podMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  jobLabel: {{ default "app.kubernetes.io/name" .Values.prometheus.podMonitor.jobLabel }}
  {{- include "childcharts.metric.prometheus-node-exporter.podmonitor.scrapeLimits" .Values.prometheus.podMonitor | nindent 2 }}
  selector:
    matchLabels:
    {{- with .Values.prometheus.podMonitor.selectorOverride }}
      {{- toYaml . | nindent 6 }}
    {{- else }}
      {{- include "childcharts.metric.prometheus-node-exporter.selectorLabels" . | nindent 6 }}
    {{- end }}
  namespaceSelector:
    matchNames:
      - {{ include "childcharts.metric.prometheus-node-exporter.namespace" . }}
  {{- with .Values.prometheus.podMonitor.attachMetadata }}
  attachMetadata:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.prometheus.podMonitor.podTargetLabels }}
  podTargetLabels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  podMetricsEndpoints:
    - port: {{ .Values.service.portName }}
      {{- with .Values.prometheus.podMonitor.scheme }}
      scheme: {{ . }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.path }}
      path: {{ . }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.basicAuth }}
      basicAuth:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.bearerTokenSecret }}
      bearerTokenSecret:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.tlsConfig }}
      tlsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.authorization }}
      authorization:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.oauth2 }}
      oauth2:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.proxyUrl }}
      proxyUrl: {{ . }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.honorTimestamps }}
      honorTimestamps: {{ . }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.honorLabels }}
      honorLabels: {{ . }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      enableHttp2: {{ default false .Values.prometheus.podMonitor.enableHttp2 }}
      filterRunning: {{ default true .Values.prometheus.podMonitor.filterRunning }}
      followRedirects: {{ default false .Values.prometheus.podMonitor.followRedirects }}
      {{- with .Values.prometheus.podMonitor.params }}
      params:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- end -}}
{{- end -}}
