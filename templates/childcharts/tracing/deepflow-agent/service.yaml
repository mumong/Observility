{{- $root := . -}}
{{- $values := include "childcharts.tracing.deepflow-agent.values" . | fromYaml -}}
{{- $ctxValues := mustMergeOverwrite (dict "global" .Values.tracing.global) (deepCopy $values) -}}
{{- $ctx := dict "Values" $ctxValues "Release" .Release "Chart" .Chart "Capabilities" .Capabilities "Files" .Files "Template" .Template -}}
{{- if and .Values.tracing.enabled $values.enabled }}
{{- with $ctx }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "childcharts.tracing.deepflow-agent.fullname" $root }}
  labels:
    {{- include "childcharts.tracing.deepflow-agent.labels" $root | nindent 4 }}
{{- if .Values.service.annotations }}
  annotations:
{{ toYaml .Values.service.annotations | indent 4 }}
{{- end }}
spec:
{{- if .Values.service.clusterIP }}
  clusterIP: {{ .Values.service.clusterIP }}
{{- end }}
{{- if .Values.service.externalIPs }}
  externalIPs:
{{ toYaml .Values.service.externalIPs | indent 4 }}
{{- end }}
{{- if .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
{{- end }}
{{- if .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
  {{- range $cidr := .Values.service.loadBalancerSourceRanges }}
    - {{ $cidr }}
  {{- end }}
{{- end }}
{{- if ne .Values.service.type "ClusterIP" }}
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
{{- end }}
  ports:
  {{- $serviceType := .Values.service.type -}}
  {{- range .Values.service.ports }}
  - name: {{ tpl .name $root }}
    port: {{ tpl (toString .port) $root }}
    targetPort: {{ tpl (toString .targetPort) $root }}
    {{- if and (eq $serviceType "NodePort") (.nodePort) }}
    nodePort: {{ tpl (toString .nodePort) $root }}
    {{- end }}
    protocol: {{ tpl .protocol $root }}
    {{- end }}
{{- if .Values.service.additionalPorts }}
{{ toYaml .Values.service.additionalPorts | indent 2 }}
{{- end }}
  selector:
    {{- include "childcharts.tracing.deepflow-agent.selectorLabels" $root | nindent 4 }}
  type: "{{ .Values.service.type }}"
{{- end }}
{{- end }}
