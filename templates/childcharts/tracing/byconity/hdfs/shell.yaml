{{- if .Values.shell.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "childcharts.tracing.byconity.hdfs.fullname" . }}-shell
  labels:
    {{- include "childcharts.tracing.byconity.hdfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: shell
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "childcharts.tracing.byconity.hdfs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: shell
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml (dict "config" .Values.config "namenode" .Values.namenode "datanode" .Values.datanode) | sha256sum }}
        checksum/secrets: {{ toYaml .Values.secrets | sha256sum }}
      labels:
        {{- include "childcharts.tracing.byconity.hdfs.labels" . | nindent 8 }}
        app.kubernetes.io/component: shell
    spec:
      containers:
      - name: shell
        image: {{ .Values.shell.repository }}:{{ .Values.shell.tag }}
        imagePullPolicy: {{ .Values.shell.imagePullPolicy }}
        command:
        - /bin/bash
        stdin: true
        tty: true
        env:
        - name: HADOOP_CONF_DIR
          value: {{ .Values.config.path }}
        volumeMounts:
        - name: config
          mountPath: {{ .Values.config.path }}
          readOnly: true
        - name: secrets
          mountPath: {{ .Values.secrets.path }}
          readOnly: true
        resources:
          {{- toYaml .Values.shell.resources | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ template "childcharts.tracing.byconity.hdfs.fullname" . }}
          optional: false
      - name: secrets
        secret:
          secretName: {{ template "childcharts.tracing.byconity.hdfs.fullname" . }}
          optional: false
      {{- with .Values.shell.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.shell.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.shell.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.shell.imagePullSecrets }}
      imagePullSecrets:
      {{- range . }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
{{- end }}

{{- end -}}
{{- end -}}
