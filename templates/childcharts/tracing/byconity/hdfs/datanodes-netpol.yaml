{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ template "childcharts.tracing.byconity.hdfs.fullname" . }}-datanodes
  labels:
    {{ include "childcharts.tracing.byconity.hdfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: datanode
spec:
  podSelector:
    matchLabels:
      {{- include "childcharts.tracing.byconity.hdfs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: datanode
  policyTypes:
  - Ingress
  ingress:
  # Allow clients to access client RPC and HTTP servers
  - ports:
    - port: http
    - port: https
    - port: data-xfer
  # Allow NameNode and DataNodes to access IPC Server
  - from:
    - podSelector:
        matchLabels:
          {{- include "childcharts.tracing.byconity.hdfs.selectorLabels" . | nindent 10 }}
    ports:
    - port: ipc
{{- end }}

{{- end -}}
{{- end -}}
