{{- $values := include "childcharts.tracing.byconity.values" . | fromYaml -}}
{{- $ctxValues := mustMergeOverwrite (dict "global" ((index .Values.tracing "global") | default dict)) (deepCopy $values) -}}
{{- $ctx := dict "Values" $ctxValues "Release" .Release "Chart" .Chart "Capabilities" .Capabilities "Files" .Files "Template" .Template -}}
{{- if and .Values.tracing.enabled ((index .Values.tracing "byconity" "enabled") | default false) -}}
{{- with $ctx -}}
{{- $ctxRoot := . -}}
{{- $imageRepository := tpl $ctxRoot.Values.image.repository . }}
{{- with .Values.byconity.server }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "childcharts.tracing.byconity.fullname" $ }}-server
  labels:
    {{- include "childcharts.tracing.byconity.labels" $ | nindent 4 }}
    byconity-role: server
spec:
  replicas: {{ .replicas }}
  serviceName: {{ include "childcharts.tracing.byconity.fullname" $ }}-server
  selector:
    matchLabels:
      {{- include "childcharts.tracing.byconity.selectorLabels" $ | nindent 6 }}
      byconity-role: server
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      {{- with .podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "childcharts.tracing.byconity.selectorLabels" $ | nindent 8 }}
        byconity-role: server
    spec:
      containers:
        - name: byconity-server
          image: "{{ $imageRepository }}:{{ $ctxRoot.Values.image.tag }}"
          imagePullPolicy: {{ $ctxRoot.Values.image.imagePullPolicy }}
          env:
            {{- toYaml $ctxRoot.Values.byconity.commonEnvs | nindent 12 }}
            - name: BYCONITY_ROLE
              value: server
          {{- if $ctxRoot.Values.byconity.additionalEnvs }}
            {{- toYaml $ctxRoot.Values.byconity.additionalEnvs | nindent 12 }}
          {{- end }}
          {{- if .resources }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          {{- end }}
          ports:
            - name: tcp
              containerPort: {{ $ctxRoot.Values.byconity.ports.tcp }}
            - name: rpc
              containerPort: {{ $ctxRoot.Values.byconity.ports.rpc }}
            - name: http
              containerPort: {{ $ctxRoot.Values.byconity.ports.http }}
            - name: tcp-secure
              containerPort: {{ $ctxRoot.Values.byconity.ports.tcpSecure }}
            - name: https
              containerPort: {{ $ctxRoot.Values.byconity.ports.https }}
            - name: exchange
              containerPort: {{ $ctxRoot.Values.byconity.ports.exchange }}
            - name: exchange-status
              containerPort: {{ $ctxRoot.Values.byconity.ports.exchangeStatus }}
          readinessProbe:
            {{- .readinessProbe | toYaml | nindent 12 }}
          livenessProbe:
            {{- .livenessProbe | toYaml | nindent 12 }}
          lifecycle:
            postStart:
              exec:
                command: ["/opt/byconity/scripts/lifecycle/poststart"]
            preStop:
              exec:
                command: ["/opt/byconity/scripts/lifecycle/prestop"]
          volumeMounts:
            - name: run
              mountPath: /etc/service/byconity/run
              subPath: run
            - name: config
              mountPath: /etc/byconity
            - name: lifecycle
              mountPath: /opt/byconity/scripts/lifecycle
            - name: local-disk
              mountPath: /var/byconity
            - name: log
              mountPath: /var/log/byconity
            - name: fdb-config
              mountPath: /etc/byconity/fdb
          {{- if $ctxRoot.Values.byconity.additionalVolumes.volumeMounts }}
            {{- toYaml $ctxRoot.Values.byconity.additionalVolumes.volumeMounts | nindent 12 }}
          {{- end }}
          {{- if .securityContext }}
          securityContext:
            {{- toYaml .securityContext | nindent 12 }}
          {{- end }}
      volumes:
        - name: run
          configMap:
            name: {{ include "childcharts.tracing.byconity.fullname" $ }}-server-run
            defaultMode: 0755
        - name: config
          configMap:
            name: {{ include "childcharts.tracing.byconity.fullname" $ }}-server-config
        - name: lifecycle
          configMap:
            name: {{ include "childcharts.tracing.byconity.fullname" $ }}-lifecycle
            defaultMode: 0755
        - name: fdb-config
          configMap:
            name: {{ include "childcharts.tracing.byconity.fullname" $ }}-fdb-config
      {{- if $ctxRoot.Values.byconity.additionalVolumes.volumes }}
        {{- toYaml $ctxRoot.Values.byconity.additionalVolumes.volumes | nindent 8 }}
      {{- end }}
      hostNetwork: {{ .hostNetwork }}
      {{- with .nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      imagePullSecrets:
      {{- with $ctxRoot.Values.global.imagePullSecrets }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $ctxRoot.Values.imagePullSecrets }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: local-disk
      spec:
        {{- include "childcharts.tracing.byconity.pvcSpec" (dict "spec" .storage.localDisk.pvcSpec "global" $ctxRoot.Values.global) | nindent 8 }}
    - metadata:
        name: log
      spec:
        {{- include "childcharts.tracing.byconity.pvcSpec" (dict "spec" .storage.log.pvcSpec "global" $ctxRoot.Values.global) | nindent 8 }}
{{- end }}

{{- end -}}
{{- end -}}
